<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label class="text-sm font-medium text-stone-700">{{ label() }}</label>
  }
  <input
    type="text"
    [value]="value()"
    (input)="value.set($any($event.target).value)"
    [placeholder]="placeholder()"
    class="w-full px-3 py-2 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder:text-stone-400 outline-none transition
           hover:border-stone-400
           focus:border-stone-700 focus:ring-2 focus:ring-stone-700/10
           disabled:opacity-50 disabled:cursor-not-allowed"
  />
</div>
