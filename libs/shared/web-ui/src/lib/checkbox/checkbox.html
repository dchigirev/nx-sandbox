<label class="inline-flex items-center gap-2.5 cursor-pointer select-none group" [class.opacity-50]="disabled()" [class.pointer-events-none]="disabled()">
  <span class="relative flex items-center justify-center w-4.5 h-4.5 rounded border border-stone-300 bg-white transition
               group-hover:border-stone-500
               [&:has(+input:checked)]:bg-stone-800 [&:has(+input:checked)]:border-stone-800">
    @if (value()) {
      <svg class="w-3 h-3 text-white" viewBox="0 0 12 12" fill="none">
        <path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
  </span>
  <input
    type="checkbox"
    class="sr-only"
    [checked]="value()"
    [disabled]="disabled()"
    (change)="value.set($any($event.target).checked)"
  />
  @if (label()) {
    <span class="text-sm text-stone-700">{{ label() }}</span>
  }
</label>
