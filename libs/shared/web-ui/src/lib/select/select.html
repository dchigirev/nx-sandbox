<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label class="text-sm font-medium text-stone-700">{{ label() }}</label>
  }

  <button
    #triggerEl
    cdkOverlayOrigin
    #origin="cdkOverlayOrigin"
    type="button"
    (click)="toggle()"
    class="flex items-center justify-between w-full px-3 py-2 rounded-lg border border-stone-300 bg-white text-stone-900 outline-none transition text-left
           hover:border-stone-400
           focus:border-stone-700 focus:ring-2 focus:ring-stone-700/10"
    [class.border-stone-700]="isOpen()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="listbox"
  >
    <span [class.text-stone-400]="!value()">{{ selectedLabel }}</span>
    <svg class="w-4 h-4 text-stone-400 transition-transform" [class.rotate-180]="isOpen()" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
    </svg>
  </button>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="origin"
    [cdkConnectedOverlayOpen]="isOpen()"
    [cdkConnectedOverlayWidth]="triggerWidth"
    [cdkConnectedOverlayOffsetY]="4"
    (overlayOutsideClick)="isOpen.set(false)"
  >
    <ul
      role="listbox"
      class="bg-white border border-stone-200 rounded-lg shadow-lg py-1 outline-none max-h-60 overflow-y-auto"
    >
      @for (option of options(); track option.value) {
        <li
          role="option"
          [attr.aria-selected]="option.value === value()"
          (click)="select(option.value)"
          class="px-3 py-2 text-sm text-stone-900 cursor-pointer outline-none transition
                 hover:bg-stone-100
                 aria-selected:font-medium aria-selected:text-stone-950"
        >
          {{ option.label }}
        </li>
      }
    </ul>
  </ng-template>
</div>
